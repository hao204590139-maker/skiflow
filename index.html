<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Skiflow 雪迹 — 系统化滑雪学习平台">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/navigation.css">

  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger" aria-label="菜单" title="菜单">
        <span></span><span></span><span></span>
      </button>
      <a href="#/" class="logo" aria-label="Skiflow 雪迹 首页">
        <span class="logo-icon">🏔️</span>
        <span class="logo-text"><strong>Skiflow</strong> <span style="font-weight:400;opacity:0.8;">雪迹</span></span>
      </a>
    </div>
    <div class="header-center">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索课程内容... (Ctrl+K)" autocomplete="off">
        <kbd class="search-kbd">Ctrl+K</kbd>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="themeToggle" aria-label="切换主题" title="切换深色/浅色主题">
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="progress-ring-container" id="progressRing" title="学习进度">
        <svg class="progress-ring" viewBox="0 0 36 36" width="36" height="36">
          <circle class="progress-ring-bg" cx="18" cy="18" r="15.5" fill="none" stroke="var(--color-border)" stroke-width="3"/>
          <circle class="progress-ring-fill" id="progressCircle" cx="18" cy="18" r="15.5" fill="none" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>
        </svg>
        <span class="progress-text" id="progressText">0%</span>
      </div>
    </div>
  </header>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-overlay-backdrop"></div>
    <div class="search-overlay-content">
      <div class="search-overlay-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="overlaySearchInput" class="search-overlay-input" placeholder="输入关键词搜索..." autocomplete="off">
        <button class="search-close" id="searchClose" aria-label="关闭搜索">✕</button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-empty">输入关键词开始搜索课程内容</div>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Rendered by navigation.js -->
      </nav>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Home Page (default) -->
      <div class="home-page" id="homePage">
        <section class="hero">
          <div class="hero-content">
            <h1 class="hero-title">
              <span class="hero-icon">🏔️</span>
              Skiflow <span style="font-weight:300;">雪迹</span>
            </h1>
            <p class="hero-subtitle">
              从零开始，成为滑雪高手。<br>
              系统化双板 &amp; 单板学习平台，涵盖从零基础到顶级技巧的完整知识体系。
            </p>
            <div class="hero-actions">
              <button class="btn btn-primary btn-lg" data-nav="ski-1-1">🎿 开始学习</button>
              <button class="btn btn-outline btn-lg" data-nav="roadmap">🗺️ 查看学习路线</button>
            </div>
          </div>
          <div class="hero-stats">
            <div class="stat-item"><span class="stat-number">2</span><span class="stat-label">学习轨道</span></div>
            <div class="stat-item"><span class="stat-number">48</span><span class="stat-label">系统章节</span></div>
            <div class="stat-item"><span class="stat-number">50+</span><span class="stat-label">教学视频</span></div>
            <div class="stat-item"><span class="stat-number">5</span><span class="stat-label">学习阶段</span></div>
          </div>
        </section>

        <section class="phases-overview" id="phasesOverview">
          <!-- Rendered by content.js -->
        </section>
      </div>

      <!-- Chapter Content Page -->
      <div class="chapter-page" id="chapterPage" style="display:none;">
        <nav class="breadcrumb" id="breadcrumb"></nav>
        <article class="chapter-content" id="chapterContent">
          <!-- Rendered by content.js -->
        </article>
        <div class="chapter-nav-bottom" id="chapterNavBottom">
          <!-- Prev/Next navigation -->
        </div>
      </div>

      <!-- Roadmap Page -->
      <div class="roadmap-page" id="roadmapPage" style="display:none;">
        <!-- Rendered by content.js -->
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <p class="footer-text">
        🏔️ <strong>Skiflow</strong> 雪迹 — 系统化滑雪学习平台 | 内容仅供学习参考，实际滑雪请在专业教练指导下进行
      </p>
      <p class="footer-disclaimer">
        ⚠️ 安全提示：滑雪是一项具有风险的运动。请务必佩戴头盔等防护装备，在能力范围内滑行，遵守雪场安全准则。
      </p>
    </div>
  </footer>

  <!-- Snowflakes Animation -->
  <div class="snowflakes-container" id="snowflakes" aria-hidden="true"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts — bundled for file:// and server compatibility -->
  <script src="js/app.bundle.js"></script>
  <script src="js/extras.js"></script>
</body>
</html>
